<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y.K.D.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --arc: #00d4ff;
    --arc-dim: #0088aa;
    --arc-glow: rgba(0, 212, 255, 0.4);
    --red: #ff3a3a;
    --gold: #ffd700;
    --bg: #010a12;
    --panel: rgba(0, 30, 50, 0.85);
    --text: #c8f0ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridScroll 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridScroll {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Scan line effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 820px;
    padding: 20px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 10px;
    position: relative;
  }

  .jarvis-title {
    font-family: 'Orbitron', monospace;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 0.5em;
    color: var(--arc);
    text-shadow: 0 0 20px var(--arc-glow), 0 0 40px var(--arc-glow);
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px var(--arc-glow), 0 0 40px var(--arc-glow); }
    50% { text-shadow: 0 0 30px var(--arc), 0 0 60px var(--arc-glow), 0 0 80px rgba(0,212,255,0.2); }
  }

  .subtitle {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--arc-dim);
    margin-top: 4px;
  }

  /* Arc reactor decoration */
  .arc-reactor {
    width: 80px;
    height: 80px;
    margin: 12px auto;
    position: relative;
  }

  .arc-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--arc);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--arc-glow), inset 0 0 10px var(--arc-glow);
  }

  .arc-ring:nth-child(1) { width: 80px; height: 80px; animation: rotate 8s linear infinite; opacity: 0.4; border-style: dashed; }
  .arc-ring:nth-child(2) { width: 60px; height: 60px; animation: rotate 5s linear infinite reverse; opacity: 0.7; }
  .arc-ring:nth-child(3) { width: 40px; height: 40px; animation: rotate 3s linear infinite; }
  .arc-core {
    position: absolute;
    width: 20px; height: 20px;
    background: radial-gradient(circle, white, var(--arc));
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px var(--arc), 0 0 40px var(--arc-glow);
    animation: corePulse 2s ease-in-out infinite;
  }

  @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
  @keyframes corePulse { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.2); } }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--arc-dim);
    border-radius: 4px;
    padding: 8px 16px;
    margin: 8px 0;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    backdrop-filter: blur(10px);
  }

  .status-item { display: flex; align-items: center; gap: 8px; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  #clock {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    color: var(--arc);
    text-shadow: 0 0 10px var(--arc-glow);
    letter-spacing: 0.2em;
  }

  /* Chat area */
  .chat-window {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--arc-dim);
    border-radius: 4px;
    padding: 16px;
    margin: 8px 0;
    backdrop-filter: blur(10px);
    overflow-y: auto;
    min-height: 380px;
    max-height: 420px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
  }

  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--arc-dim); border-radius: 2px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-items: flex-end; }
  .message.jarvis { align-items: flex-start; }

  .msg-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--arc-dim);
    text-transform: uppercase;
  }

  .msg-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 0.82rem;
    line-height: 1.6;
    position: relative;
  }

  .message.user .msg-bubble {
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid var(--arc-dim);
    color: var(--text);
  }

  .message.jarvis .msg-bubble {
    background: rgba(255, 58, 58, 0.06);
    border: 1px solid rgba(255, 58, 58, 0.3);
    color: #ffdddd;
    border-left: 3px solid var(--red);
  }

  .message.jarvis .msg-bubble::before {
    content: 'Y.K.D.';
    display: block;
    font-size: 0.6rem;
    color: var(--red);
    letter-spacing: 0.15em;
    margin-bottom: 4px;
    font-family: 'Orbitron', monospace;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    padding: 10px 14px;
    border: 1px solid rgba(255,58,58,0.3);
    border-left: 3px solid var(--red);
    border-radius: 4px;
    width: fit-content;
    background: rgba(255,58,58,0.06);
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    display: flex;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--arc-dim);
    border-radius: 4px;
    padding: 10px 14px;
    margin: 8px 0;
    backdrop-filter: blur(10px);
  }

  .input-area input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  .input-area input::placeholder { color: var(--arc-dim); opacity: 0.6; }

  .send-btn {
    background: transparent;
    border: 1px solid var(--arc);
    color: var(--arc);
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .send-btn:hover {
    background: var(--arc);
    color: var(--bg);
    box-shadow: 0 0 15px var(--arc-glow);
  }

  .send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Quick commands */
  .quick-cmds {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 4px 0 8px;
  }

  .cmd-chip {
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--arc-dim);
    color: var(--arc-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    padding: 4px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .cmd-chip:hover {
    border-color: var(--arc);
    color: var(--arc);
    box-shadow: 0 0 8px var(--arc-glow);
  }

  /* Voice buttons */
  .mic-btn {
    background: transparent;
    border: 1px solid var(--arc-dim);
    color: var(--arc-dim);
    font-size: 1.1rem;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mic-btn:hover { border-color: var(--arc); color: var(--arc); box-shadow: 0 0 10px var(--arc-glow); }
  .mic-btn.listening {
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 15px rgba(255,58,58,0.6);
    animation: micPulse 1s ease-in-out infinite;
  }
  @keyframes micPulse { 0%,100%{box-shadow:0 0 10px rgba(255,58,58,0.4);} 50%{box-shadow:0 0 25px rgba(255,58,58,0.8);} }

  .speaker-btn {
    background: transparent;
    border: 1px solid var(--arc-dim);
    color: var(--arc-dim);
    font-size: 0.65rem;
    font-family: 'Orbitron', monospace;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .speaker-btn:hover { border-color: var(--gold); color: var(--gold); }
  .speaker-btn.speaking { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.4); }

  .voice-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--panel);
    border: 1px solid var(--arc-dim);
    border-radius: 4px;
    margin: 4px 0 8px;
    backdrop-filter: blur(10px);
    font-size: 0.68rem;
    color: var(--arc-dim);
  }

  .voice-wave {
    display: flex;
    gap: 3px;
    align-items: center;
    height: 20px;
  }
  .voice-wave span {
    width: 3px;
    background: var(--red);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
    display: none;
  }
  .voice-wave.active span { display: block; }
  .voice-wave span:nth-child(1) { animation-delay: 0s; }
  .voice-wave span:nth-child(2) { animation-delay: 0.1s; }
  .voice-wave span:nth-child(3) { animation-delay: 0.2s; }
  .voice-wave span:nth-child(4) { animation-delay: 0.1s; }
  .voice-wave span:nth-child(5) { animation-delay: 0s; }

  @keyframes wave {
    0%,100% { height: 4px; }
    50% { height: 18px; }
  }

  /* Decorative corners */
  .corner-decor {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--arc);
    border-style: solid;
    opacity: 0.6;
  }
  .corner-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .corner-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="jarvis-title">Y.K.D.</div>
    <div class="subtitle">YİĞİT KİŞİSEL DESTEK SİSTEMİ</div>
    <div class="arc-reactor">
      <div class="arc-ring"></div>
      <div class="arc-ring"></div>
      <div class="arc-ring"></div>
      <div class="arc-core"></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot"></div>
      <span>SİSTEM ÇEVRIMIÇI</span>
    </div>
    <div id="clock">00:00:00</div>
    <div class="status-item">
      <span id="dateDisplay">—</span>
    </div>
  </div>

  <div class="chat-window" id="chatWindow">
    <div class="corner-decor corner-tl"></div>
    <div class="corner-decor corner-tr"></div>
    <div class="corner-decor corner-bl"></div>
    <div class="corner-decor corner-br"></div>
    <div class="message jarvis">
      <div class="msg-bubble">Hoş geldin, Yiğit. Sistemler hazır. Saat, ödevler veya herhangi bir konuda yardımcına hazırım. Ne lazım?</div>
    </div>
  </div>
  <div class="voice-controls">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Sesli konuş">🎤</button>
    <div class="voice-wave" id="voiceWave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <span id="voiceStatus">Mikrofona basarak konuşun</span>
    <div style="flex:1"></div>
    <button class="speaker-btn" id="speakerBtn" onclick="toggleSpeaker()">🔊 SES AÇIK</button>
  </div>

  <div class="quick-cmds">
    <button class="cmd-chip" onclick="sendQuick('Saat kaç?')">⏱ Saat kaç?</button>
    <button class="cmd-chip" onclick="sendQuick('Bugün hava nasıl?')">🌤 Hava durumu</button>
    <button class="cmd-chip" onclick="sendQuick('Matematik ödevim var, yardım eder misin?')">📐 Matematik</button>
    <button class="cmd-chip" onclick="sendQuick('Bugün ne yapmalıyım?')">📋 Günlük plan</button>
    <button class="cmd-chip" onclick="sendQuick('Türkiye başkenti neresidir?')">🗺 Genel bilgi</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Komut giriniz, Yiğit..." autocomplete="off" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">GÖNDER</button>
    <button class="mic-btn" id="micBtn2" onclick="toggleMic()" title="Sesli konuş" style="border-radius:2px;width:38px;">🎤</button>
  </div>

</div>

<script>
// Clock
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;

  const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  document.getElementById('dateDisplay').textContent =
    days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

const chatWindow = document.getElementById('chatWindow');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

// Conversation history for multi-turn
let history = [];

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message jarvis';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function getSystemPrompt() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('tr-TR');
  const dateStr = now.toLocaleDateString('tr-TR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  return `Sen Y.K.D. — Yiğit'in kişisel yapay zeka asistanısın. Türkçe konuş. Sıcak ve samimi. Kullanıcıya Yiğit diye hitap et. Şu an saat: ${timeStr}, tarih: ${dateStr}. Ödev sorularında adım adım açıkla. ÇOK ÖNEMLİ KURALLAR: Eğer kullanıcı YouTube veya müzik çalmasını isterse SADECE şunu yaz: EYLEM:MUZIK:arama_terimi - Eğer WhatsApp mesajı isterse SADECE şunu yaz: EYLEM:WHATSAPP:abicim:mesaj - Başka hiçbir şey yazma, sadece bu formatı kullan.`;
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = '';
  sendBtn.disabled = true;
  appendMessage('user', text);

  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const GEMINI_API_KEY = 'AIzaSyD4otXBgpK-GOwcAReiotszffvz3CIZeWQ';
    const msgs = history.map(m => ({role: m.role === 'assistant' ? 'model' : 'user', parts: [{text: m.content}]}));
    const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_API_KEY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system_instruction: {parts: [{text: getSystemPrompt()}]}, contents: msgs })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Anlayamadım Yiğit.';
    history.push({ role: 'assistant', content: reply });
    // Eylem kontrolü
    let display = reply;
    if (reply.startsWith('EYLEM:MUZIK:')) {
      const query = reply.replace('EYLEM:MUZIK:', '').trim();
      window.open('https://music.youtube.com/search?q=' + encodeURIComponent(query), '_blank');
      display = 'YouTube Music açılıyor: ' + query + ' 🎵';
    } else if (reply.startsWith('EYLEM:WHATSAPP:')) {
      const parts = reply.replace('EYLEM:WHATSAPP:', '').split(':');
      const msg = parts.slice(1).join(':').trim();
      const num = '905319111006';
      window.open('https://wa.me/' + num + '?text=' + encodeURIComponent(msg), '_blank');
      display = 'WhatsApp açılıyor! Mesaj hazır: ' + msg + ' ✉️';
    }
    appendMessage('jarvis', display);
    speak(display);

  } catch (err) {
    removeTyping();
    appendMessage('jarvis', 'Üzgünüm Yiğit, bağlantı hatası oluştu. Sistemleri kontrol ediyorum...');
  }

  sendBtn.disabled = false;
  userInput.focus();
}

function sendQuick(text) {
  userInput.value = text;
  sendMessage();
}

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// ── TTS (Text-to-Speech) ──────────────────────────────
let speakerOn = true;
let currentUtterance = null;

function toggleSpeaker() {
  speakerOn = !speakerOn;
  const btn = document.getElementById('speakerBtn');
  if (!speakerOn) {
    speechSynthesis.cancel();
    btn.textContent = '🔇 SES KAPALI';
    btn.classList.remove('speaking');
  } else {
    btn.textContent = '🔊 SES AÇIK';
  }
}

function speak(text) {
  if (!speakerOn) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'tr-TR';
  utter.rate = 1.0;
  utter.pitch = 0.85; // biraz derin, Y.K.D. gibi
  utter.volume = 1;

  // Türkçe ses varsa onu seç
  const voices = speechSynthesis.getVoices();
  const trVoice = voices.find(v => v.lang.startsWith('tr'));
  if (trVoice) utter.voice = trVoice;

  const btn = document.getElementById('speakerBtn');
  utter.onstart = () => btn.classList.add('speaking');
  utter.onend = () => btn.classList.remove('speaking');
  utter.onerror = () => btn.classList.remove('speaking');

  currentUtterance = utter;
  speechSynthesis.speak(utter);
}

// Sesler yüklenince dene
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

// ── Speech Recognition (Mikrofon) ─────────────────────
let recognition = null;
let isListening = false;

function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const r = new SpeechRecognition();
  r.lang = 'tr-TR';
  r.interimResults = true;
  r.continuous = false;

  r.onstart = () => {
    isListening = true;
    setMicState(true);
  };

  r.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    userInput.value = final || interim;
  };

  r.onend = () => {
    isListening = false;
    setMicState(false);
    const text = userInput.value.trim();
    if (text) sendMessage();
  };

  r.onerror = (e) => {
    isListening = false;
    setMicState(false);
    if (e.error !== 'no-speech') {
      document.getElementById('voiceStatus').textContent = 'Mikrofon hatası: ' + e.error;
    }
  };

  return r;
}

function setMicState(on) {
  const micBtns = [document.getElementById('micBtn'), document.getElementById('micBtn2')];
  const wave = document.getElementById('voiceWave');
  const status = document.getElementById('voiceStatus');
  micBtns.forEach(b => { if(b) b.classList.toggle('listening', on); });
  wave.classList.toggle('active', on);
  status.textContent = on ? 'Dinliyorum...' : 'Mikrofona basarak konuşun';
}

function toggleMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('Tarayıcınız mikrofonu desteklemiyor. Chrome kullanmanızı öneririm, Yiğit.');
    return;
  }

  if (isListening) {
    recognition && recognition.stop();
    return;
  }

  recognition = setupRecognition();
  if (recognition) recognition.start();
}

// Açılış seslendiirmesi (kısa gecikmeyle sesler yüklendikten sonra)
setTimeout(() => speak('Hoş geldin Yiğit. Sistemler hazır.'), 1200);

</script>
